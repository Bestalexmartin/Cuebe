databases:
  - name: cuebe-postgres
    databaseName: cuebe_db
    user: cuebe_user

services:
  # =========================
  # FastAPI Backend (Web Service)
  # =========================
  - type: web
    name: cuebe-backend
    runtime: python
    plan: starter
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT --proxy-headers
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cuebe-postgres
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: API_BASE_URL
        value: https://api.cuebe.app
      - key: ALLOWED_ORIGINS
        value: https://cuebe.app,https://www.cuebe.app,https://cuebe-frontend.onrender.com

  # =========================
  # React Frontend (Static Site)
  # =========================
  - type: web
    name: cuebe-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    buildFilter:
      paths:
        - frontend/**
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://api.cuebe.app
